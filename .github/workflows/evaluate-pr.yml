name: Evaluate DeployFix AI PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  evaluate-pr:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'deployfix-ai[bot]' # Updated bot name
    permissions:
      contents: read
      pull-requests: read
      issues: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Evaluation
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: npx tsx validation/evaluate-pr.ts
