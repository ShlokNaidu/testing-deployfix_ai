name: Test Publishing Artifacts

on:
  push:
    branches: [main, failure/**]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    # MISSING: permissions block here should allow write access

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Build
      run: npm run build
    
    - name: Attempt to create release (will fail without permissions)
      run: |
        gh release create v1.0.0 --notes "Test release" || echo "Failed due to missing permissions"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
